name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 4 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: |
          curl -sf "$URL/rest/v1/appraisals?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY"
